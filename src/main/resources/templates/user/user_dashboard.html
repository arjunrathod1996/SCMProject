<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:fragment="parent(content,title,script)">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
    
    <title data-th-text="${user.getEmail()}">Profile Page</title>

    <!-- 🔥 ONE LINE IMPORTS ALL CSS 🔥 -->
    <th:block th:replace="~{user/dashboard_fragments :: head_imports}"></th:block>
    
    <style>
.container {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 200px;
    width: 100%;
    background: linear-gradient(135deg, #f06, #ffcc33);
    color: white;
    font-size: 24px;
    font-weight: bold;
    border-radius: 10px;
    box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
    perspective: 1000px;
    overflow: hidden;
    transform-style: preserve-3d;
    transition: transform 1s;
}

@keyframes rotate3d {
    0% {
        transform: rotateY(0deg);
        background: linear-gradient(135deg, #f06, #ffcc33);
    }
    25% {
        transform: rotateY(90deg);
        background: linear-gradient(135deg, #33ccff, #ff99cc);
    }
    50% {
        transform: rotateY(180deg);
        background: linear-gradient(135deg, #ccff33, #9933ff);
    }
    75% {
        transform: rotateY(270deg);
        background: linear-gradient(135deg, #ff3333, #33ff66);
    }
    100% {
        transform: rotateY(360deg);
        background: linear-gradient(135deg, #f06, #ffcc33);
    }
}

#responsiveContainer {
    animation: rotate3d 5s infinite;
}

@media (max-width: 768px) {
    .container {
        font-size: 20px;
        height: 150px;
    }
}

@media (max-width: 480px) {
    .container {
        font-size: 16px;
        height: 100px;
    }
}

	</style>

</head>

<body>

    <div th:replace="~{user/user_sidebar :: user_sidebar}" ></div>

   <div id="responsiveContainerAlert" >
        <div  id="status_alert_content"  class="alert hidden alert-warning container text-center"  role="alert">
            Welcome Dashbord !!!!
        </div>
   </div>
      

    <!-- 🔥 ONE LINE IMPORTS ALL JS 🔥 -->
    <th:block th:replace="~{user/dashboard_fragments :: script_imports}"></th:block>

<script type="text/javascript">
	
	
 window.addEventListener('resize', function() {
    var container = document.getElementById('responsiveContainer');
    if (window.innerWidth < 480) {
        container.style.height = '100px';
        container.style.fontSize = '16px';
    } else if (window.innerWidth < 768) {
        container.style.height = '150px';
        container.style.fontSize = '20px';
    } else {
        container.style.height = '200px';
        container.style.fontSize = '24px';
    }
});


</script>
</body>
</html>
