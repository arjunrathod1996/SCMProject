<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <!-- FRAGMENT: HEAD IMPORTS (CSS) -->
    <th:block th:fragment="head_imports">
        <!-- Common CSS -->
        <link rel="stylesheet" th:href="@{/css/common.css}">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.2.0/css/all.min.css">
        <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
        
        <!-- Custom CSS -->
        <link rel="stylesheet" th:href="@{/css/custom.css}">
        <link rel="stylesheet" th:href="@{/css/sidebar.scss}">
        <link rel="stylesheet" th:href="@{/css/min.css}">
        <link rel="stylesheet" th:href="@{/css/admin2.css}">
        
        <!-- DataTables CSS -->
        <link rel="stylesheet" href="https://cdn.datatables.net/1.11.3/css/jquery.dataTables.min.css">
        <link rel="stylesheet" href="https://cdn.datatables.net/1.11.3/css/dataTables.bootstrap4.min.css">
        <link rel="stylesheet" href="https://cdn.datatables.net/select/1.3.3/css/select.dataTables.min.css">
        
        <!-- Other Plugins CSS -->
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-datepicker/1.10.0/css/bootstrap-datepicker.min.css">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-datepicker/1.10.0/css/bootstrap-datepicker3.min.css">
        <link href="https://cdnjs.cloudflare.com/ajax/libs/select2/4.0.13/css/select2.min.css" rel="stylesheet" />
        <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-select/1.14.0-beta2/css/bootstrap-select.min.css" rel="stylesheet">
        
        <!-- Enterprise Styles Override -->
        <style>
            body { font-family: 'Inter', sans-serif !important; background-color: #f8fafc; }
            .table { width: 100%; border-collapse: collapse; background-color: white; box-shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.1); border-radius: 0.5rem; overflow: hidden; }
            .table th { background-color: #f1f5f9; color: #475569; font-weight: 600; text-transform: uppercase; font-size: 0.75rem; padding: 1rem; border-bottom: 1px solid #e2e8f0; }
            .table td { padding: 1rem; border-bottom: 1px solid #f8fafc; color: #334155; font-size: 0.875rem; vertical-align: middle; }
            .table tr:hover td { background-color: #f8fafc; }
            .card { border: none !important; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1) !important; border-radius: 0.75rem !important; }
            .btn { border-radius: 0.375rem !important; font-weight: 500 !important; }
        </style>
    </th:block>
</head>
<body>

    <!-- FRAGMENT: SCRIPT IMPORTS (JS) -->
    <th:block th:fragment="script_imports">
        <!-- Core JS -->
        <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/2.11.6/umd/popper.min.js"></script>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/4.6.1/js/bootstrap.bundle.min.js"></script>
        
        <!-- DataTables JS -->
        <script src="https://cdn.datatables.net/1.11.3/js/jquery.dataTables.min.js"></script>
        <script src="https://cdn.datatables.net/select/1.3.3/js/dataTables.select.min.js"></script>
        
        <!-- Other Plugins JS -->
        <script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-select/1.14.0-beta2/js/bootstrap-select.min.js"></script>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-datepicker/1.10.0/js/bootstrap-datepicker.min.js"></script>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-3-typeahead/4.0.2/bootstrap3-typeahead.min.js"></script>
        
        <!-- Custom Scripts -->
        <script src="/js/script.js"></script> 
        <script src="/js/side.js"></script>
        <script src="/js/admin2.js"></script>
        <script src="/js/admin2_min.js"></script>
    </th:block>

</body>
</html>
