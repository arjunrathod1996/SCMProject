<!DOCTYPE html>

<head>

    <!-- 🔥 ONE LINE IMPORTS ALL CSS 🔥 -->

</head>

	url = "/user/dashboard/bill/insight/fragment/overview";
	$('#fragment_overview').load(url,function(){
	});
