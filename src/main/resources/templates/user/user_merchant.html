<!DOCTYPE html>
<html lang="en"  xmlns:th="http://www.thymeleaf.org" th:fragment="parent(content,title,script)">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
    <title data-th-text="${user.getEmail()}">Profile Page</title>
    <!-- 🔥 ONE LINE IMPORTS ALL CSS 🔥 -->
    <th:block th:replace="~{user/dashboard_fragments :: head_imports}"></th:block>
</head>

<body>

    <div th:replace="~{user/user_sidebar :: user_sidebar}" ></div>

   <div id="responsiveContainerAlert" >
        <div  id="status_alert_content"  class="alert hidden alert-warning container text-center"  role="alert">
           
        </div>
   </div>
      
        <div  class="small_screen" id="responsiveContainer" >
            <!-- Page Heading -->
            <div class="d-sm-flex align-items-center justify-content-between mb-4">
                <h1 class="h3 mb-0 text-gray-800 text-primary">Merchant</h1>
            </div>
            <!-- ./Page Heading -->
            <!-- Horizonatal Line -->
            <hr class="mt-0 mb-4">
            <!-- ./Horizonatal Line -->
            <!-- Search Data -->                
            <div class="d-flex flex-wrap align-items-center mb-4 small">
                <div class="form-group mb-2" style="width: 150px; margin-left: 5px; padding: 0;">
                    <div id="date_picker_start" class="input-group date">
                        <input id="start_date" class="form-control input-sm" type="text"
                            placeholder="Start Date"
                            th:value="${param.startDate != null} ? ${param.startDate[0]}"
                            style="font-size: 12px;" />
                        <span class="input-group-addon">
                            <span class="fa fa-calendar"></span>
                        </span>
                    </div>
                </div>
                <div class="form-group mb-2" style="width: 150px; margin-left: 5px; padding: 0;">
                    <div id="date_picker_end" class="input-group date">
                        <input id="end_date" class="form-control input-sm" type="text"
                            placeholder="End Date"
                            th:value="${param.endDate != null} ? ${param.endDate[0]}"
                            style="font-size: 12px;" />
                        <span class="input-group-addon">
                            <span class="fa fa-calendar"></span>
                        </span>
                    </div>
                </div>
                <div class="form-group mb-2" style="width: 150px; margin-left: 5px; padding: 0;">
                    <input id="nmae" class="form-control input-sm" type="text" placeholder="Name"
                        th:value="${param.name != null} ? ${param.name[0]}" style="font-size: 12px" />
                </div>
                <div class="form-group mb-2" style="margin-left: 5px; padding: 0;">
                    <button type="button" class="btn btn-default btn-sm square-border-radius" onclick="filter()">
                        <i class="fa fa-search" aria-hidden="true"></i>
                    </button>
                </div>
            </div>
            <!-- ./Search Data -->
            <!-- Buttons -->
            <div class="d-sm-flex align-items-center justify-content-end mb-4 small">
                <div class="btn-group btn-group-sm">
                    <button sec:authorize="hasAnyAuthority('ROLE_ADMIN')" data-toggle="modal" onclick="showCreateForm()" class="btn btn-default btn-sm" title="Create Raffle Pot" style="border: 1px solid #ccc; border-radius: 5px;">
                        <i class="fa fa-plus"></i>
                    </button>
                     <button sec:authorize="hasAnyAuthority('ROLE_MERCHANT_ADMIN')" data-toggle="modal" onclick="showGalleryView()"  class="btn btn-default btn-sm ml-2" title="Gallery" style="border: 1px solid #ccc; border-radius: 5px;">
                        <i class="fa fa-image"></i>
                    </button>
                </div>
            </div>
            <!-- ./Buttons -->
            <!-- Table -->
            <div class=" d-flex flex-wrap align-items-center mb-4 small">
                <div class="table-responsive" style="overflow-x: auto;">
                    <table id="merchantTable" class="table table-striped table-hover small" width="100%" cellspacing="0">
                        <thead>
                            <tr>
                                <th></th>
                                <th>Merchant</th>
                                <th>Phone Number</th>
                                <th>Locality</th>
                                <th>Address</th>
                                <th>Time</th>
                            </tr>
                        </thead>
                    </table>
                </div>   
            </div>
            <!-- Modal -->
            <div id="merchantModal" class="modal fade "  tabindex="-1" role="dialog" aria-labelledby="merchantModalLabel" aria-hidden="true" style="margin-top: 70px;">
                <div class="modal-dialog" role="document" style="max-width: 500px;">
                    <div class="modal-content">
                        <div class="modal-header">
                            <h5 class="modal-title" id="merchantModalLabel"><span id="header_modal">Create </span> Merchant</h5>
                            <button onclick="closeModal()" type="button" class="close" data-dismiss="modal" aria-label="Close">
                                <span aria-hidden="true">&times;</span>
                            </button>
                        </div>
                        <div class="modal-body">
                            <form id="merchant_form">
							<div class="row">
									<div class="col-lg-12">
										<div class="form-group">
											<label class="control-label">Business</label>
											<div>
												<input id = "business_name" autocomplete="off" class="form-control input-sm" type="text" placeholder="Business Name">
												<input id="business_id" type="hidden" class="form-control small">
												<small class="help-block">Type first 3 Characters to Seach Country Name</small>
											</div>
										</div>
									</div>
									<div class="col-lg-12">
										<div class="form-group">
											<label class="control-label">City</label>
											<div>
												<input id = "city_name" autocomplete="off" class="form-control input-sm" type="text" placeholder="City Name">
												<input id="city_id" type="hidden" class="form-control">
												<small class="help-block">Type first 3 Characters to Seach City Name</small>
											</div>
										</div>
									</div>
								</div>
                                <div class="row">
                                    <div class="col-lg-6" >
                                        <div class="form-group">
                                            <label class="control-label ">Merchant Name</label>
                                            <input type="text" id="name" class="form-control input-sm" name="name">
                                        </div>
                                    </div>
                                    <div class="col-lg-6">
                                        <div class="form-group">
                                            <label class="control-label">Short Link</label>
                                            <input type="text" id="shortLink" class="form-control input-sm" name="shortLink">
                                        </div>
                                    </div>
                                </div>
                                <div class="row">
                                    <div class="col-lg-6" >
                                        <div class="form-group">
                                            <label class="control-label">Mobile Number</label>
                                            <input type="text" id="mobileNumber" class="form-control input-sm" name="mobileNumber">
                                        </div>
                                    </div>
                                    <div class="col-lg-6" >
                                        <div class="form-group">
                                            <label class="control-label">Locality</label>
                                            <input type="text" id="locality" class="form-control input-sm" name="locality">
                                        </div>
                                    </div>
                                </div>
                                <div class="row">
                                    <div class="col-lg-12" >
                                        <div class="form-group">
                                            <label class="control-label">Address</label>
                                            <input type="text" id="address" class="form-control input-sm" name="address">
                                        </div>
                                    </div>
                                </div>
                                <!--./row-->
                                <div class="row">
                                    <div class="col-lg-12">
                                        <div class="form-group text-right">
                                            <button type="button" class="btn btn-sm btn-default" onclick="closeModal()">Close</button>&nbsp;
                                            <button id="btn_submit" type="button" class="btn btn-sm btn-primary" onClick="save()">Save</button>
                                        </div>	
                                        <div id="message_status" class="alert alert-info text-center hidden"></div>
                                    </div>
                                </div>
                                <div class="row mb-5">
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>

    <!-- 🔥 ONE LINE IMPORTS ALL JS 🔥 -->
    <th:block th:replace="~{user/dashboard_fragments :: script_imports}"></th:block>

<script type="text/javascript">
	

<!-- For Country-->
var mBusinessInput = $('#business_name');
		
mBusinessInput.change(function(){
	var current = mBusinessInput.typeahead("getActive");
	if(current){
		if(current.name == mBusinessInput.val()){
			$('#business_id').val(current.id);
		}else{
			$('#business_id').val("");
		}
	}
});

var businessQuery = function(query,process){
	statusAlertWidget('#message_status','alert-progress',null);
	$.get('/api/business/search?name=' + query,
		function(data){
		statusAlertWidget('#message_status',null,null);
				return process(data);
	}).fail(function(){
		statusAlertWidget('#message_status','alert-danger','Failed read lead');
	});
}


/* --------------- For City ------------------- */
var mCityInput = $('#city_name');
		
mCityInput.change(function(){
	var current = mCityInput.typeahead("getActive");
	if(current){
		if(current.name == mCityInput.val()){
			$('#city_id').val(current.id);
		}else{
			$('#city_id').val("");
		}
	}
});

var cityQuery = function(query,process){
	statusAlertWidget('#message_status','alert-progress',null);
	$.get('/api/location/city/search?name=' + query,
		function(data){
		statusAlertWidget('#message_status',null,null);
		if(data.length > 0){
			for(i = 0 ; i <data.length; i++){
				data[i]['name'] = data[i]['city'];
			}
		}
		return process(data);
	}).fail(function(){
		statusAlertWidget('#message_status','alert-danger','Failed read lead');
	});
}

$(document).ready(function () {
		
	mBusinessInput.typeahead({
		source : businessQuery,
		minLength : 1,
		items : 'all',
	});
	
	mCityInput.typeahead({
		source : cityQuery,
		minLength : 1,
		items : 'all',
	});
	setupmerchantTable();  
	setupDatePicker()
});

function setupmerchantTable() {
        var url = '/api/merchantPageWise';
        var parm = undefined;
        if (location.href.indexOf('?') > 0) {
            parm = location.href.substring(location.href.indexOf('?'), location.href.length);
            url += parm;
        }

        var name = "merchantTable";
        var columns = setUpColumns();
        var columnDefs = [{
                orderable: false,
                className: 'select-checkbox',
                targets: 0,
            },
            {
                orderable: true,
                targets: [0],
                orderSequence: ["desc", "asc",]
            }
        ];

        var select = {
            style: 'single',
            selector: 'td:first-child'
        };

        tableInit(name, columns, [0, "desc"], columnDefs, select, url);
    }

function setUpColumns() {
    var columns = [
        { data: "id", defaultContent: "","render": function (data, type, row) {
             return "<input class = 'hidden' class='dt-checkboxes' value = " + data + ">";
         } },  // Placeholder for checkbox column
        { 
            data: "name", 
            render: function(data, type, row) {
                return data ? data : '';
            } 
        },
        { 
            data: "mobileNumber", 
            render: function(data, type, row) {
                return data ? data : '';
            } 
        },
         { 
            data: "locality", 
            render: function(data, type, row) {
                return data ? data : '';
            } 
        },
        { 
            data: "address", 
            render: function(data, type, row) {
                return data ? data : '';
            } 
        },
        { 
            data: "creationTime", 
            render: function(data, type, row) {
                return data ? data : '';
            } 
        }
    ];
    return columns;
}

function showCreateForm(){
	$('#merchantModal').modal('show');
};

function save() {
	 $('#business_name').closest('.form-group').removeClass('has-error');
     $('#city_name').closest('.form-group').removeClass('has-error');
     $('#mobileNumber').closest('.form-group').removeClass('has-error');
     $('#locality').closest('.form-group').removeClass('has-error');
     $('#address').closest('.form-group').removeClass('has-error');
    
    if (!$('#business_name').val()) {
        $('#business_name').closest('.form-group').addClass('has-error');
        return false;
    }
    
     if (!$('#city_name').val()) {
        $('#city_name').closest('.form-group').addClass('has-error');
        return false;
    }
    
     if (!$('#mobileNumber').val()) {
        $('#mobileNumber').closest('.form-group').addClass('has-error');
        return false;
    }
    
    if (!$('#locality').val()) {
        $('#locality').closest('.form-group').addClass('has-error');
        return false;
    }
    
    if (!$('#address').val()) {
        $('#address').closest('.form-group').addClass('has-error');
        return false;
    }
    
    statusAlertWidget('#message_status', 'alert-progress', null);
    
    var row = readTableData('#merchantTable');
    
    var id = row[0];
    var businessID = $('#business_id').val();
	var regionID = $('#city_id').val();
	var url = '/api/merchant?businessID=' + businessID;
	var params = '';

	if (id) {
	    params += '&id=' + id; // Append id parameter
	}
	
	if (regionID) {
	    params += '&regionID=' + regionID; // Append regionID parameter
	}
    
    url += params;
    
    console.log('url : ' + url);
    
    var merchantData = {
        'name'          : $('#name').val(),
        'shortLink'     : $('#shortLink').val(),
        'mobileNumber'  : $('#mobileNumber').val(),
        'locality'      : $('#locality').val(),
        'address'       : $('#address').val()
    };
    
    console.log('data', JSON.stringify(merchantData));
    
    $.ajax({
        headers : {
            'Content-Type' : 'application/json'
        },
        data    : JSON.stringify(merchantData),
        timeout : 60000,
        type    : 'POST',
        url     : url,
        beforeSend : function() {
            com_disableClick('btn_submit');
        },
    }).done(function(data, textStatus, jqXHR) {
        statusAlertWidget('#message_status', 'alert alert-success', 'Successfully Submitted...');
    }).fail(function(jqXHR, textStatus, errorThrown) {
        if (jqXHR && jqXHR.responseText) {
            statusAlertWidget('#message_status', 'alert alert-danger', 'Failed : ' + jqXHR.responseText);
        } else {
            statusAlertWidget('#message_status', 'alert alert-danger', 'Failed to Save');
        }
    });
}


function showEditForm(){
			
    statusAlert(null,null);
    
    var row = readTableData('#merchantTable');
    
    if(row.length == 0){
        statusAlert('alert-danger','No Business Selected');
        return;
    }
    
    initModal(row[0]);
}

function initModal(id) {
    statusAlert('alert-progress', 'Please wait....');
    
    var url = "/api/business?id=" + id;
    
    console.log('url..........', url);
    
    $.get(url, function(data) {
        statusAlert(null, null);
       
        $('#merchantModal').modal('show');
        // Populate modal fields with data
        $('#name').val(data.name);
        $('#fullName').val(data.fullName);
        $('#address').val(data.address);
        $('#description').val(data.description);
    }).fail(function(error) {
        statusAlert('alert-danger', 'Failed to read Business');
    });
}

function deleteData(){
	
	statusAlert('alert-progress',null);
	var row = readTableData('#merchantTable');
	if(row.length == 0){
		statusAlert('alert-danger','No Business Selected');
		return;
	}
	$.get('/api/business/delete?id=' + row[0],
		function(data){
			statusAlert(null,null);
			location.reload();
		}).fail(function(){
			statusAlert('alert-danger','Failed to deleted');
		});
}

function setupDatePicker(){
    var datePickerOptions = {
        format: 'yyyy-mm-dd',
        autoclose: true
    };
    $('#date_picker_start').datepicker(datePickerOptions);
    $('#date_picker_end').datepicker(datePickerOptions);
}

function filter(){
	params = "";
	var url = '/user/dashboard/business';
	var filterFields = [
		['#start_date','startDate'],['#end_date','endDate'],
		['#name','name'],
		['#address','address'],
	    ]
	com_invokeUrlWithParms(url,filterFields,'merchantTable');
}

function showGalleryView() {
	var row = readTableData('#merchantTable');
	var id = row[0];
	
	if(!id){
		statusAlert('alert-danger',"Select Entry");
		return;
	}
	
	var url = '/user/dashboard/gallery_merchant?merchantID=' + id;
	window.open(url,"_blank");
}

function closeModal() {
    location.reload();
}


</script>
</body>
</html>
