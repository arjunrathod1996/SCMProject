apiVersion: v1
kind: Service
metadata:
  name: scm-app-service # Renamed for clarity to match the app
  annotations:
    # For cloud providers like GKE/AKS/EKS, this can request a static IP.
    # The exact annotation may vary by cloud provider.
    # service.beta.kubernetes.io/azure-load-balancer-ipv4: "YOUR_STATIC_IP_HERE"
    # service.beta.kubernetes.io/aws-load-balancer-ipv4-addresses: "YOUR_STATIC_IP_HERE"
    # networking.gke.io/load-balancer-type: "Internal" # or "External"
  labels:
    app: scm-app
spec:
  # Type LoadBalancer exposes the service externally using a cloud provider's load balancer.
  # For true enterprise setups, you would likely use type: ClusterIP and manage external traffic with an Ingress Controller.
  type: LoadBalancer 
  selector:
    app: scm-app
  ports:
    - protocol: TCP
      port: 80 # Expose on the standard HTTP port
      targetPort: 8081 # Route to the container's port
