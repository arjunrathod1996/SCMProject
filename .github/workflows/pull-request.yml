name: pull-request-job

on:
  workflow_dispatch:
  pull_request:
    branches: [master, main, dev]

concurrency:
  group: pr-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-test:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: SEC
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
        ports:
          - 3306:3306

    steps:
      # 1. Checkout
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2. Setup Java
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      # 3. Wait for MySQL (CRITICAL FIX)
      - name: Wait for MySQL
        run: |
          echo "Waiting for MySQL to be ready..."
          for i in {1..30}; do
            mysqladmin ping -h127.0.0.1 -uroot -proot && break
            sleep 2
          done

      # 4. Validate tests (optional strict mode)
      - name: Check for missing test files
        run: |
          CHANGED_FILES=$(git diff --name-only origin/${{ github.base_ref }} HEAD | grep '^src/main/java/.*\.java$' || true)

          if [ -n "$CHANGED_FILES" ]; then
            for file in $CHANGED_FILES; do
              TEST_FILE=$(echo "$file" | sed 's|src/main/java|src/test/java|' | sed 's|\.java$|Test.java|')
              if [ ! -f "$TEST_FILE" ]; then
                echo "❌ Missing test for $file"
                exit 1   # make strict (change to warning if needed)
              fi
            done
          fi

      # 5. Build + Test
      - name: Build, Test, Coverage
        run: mvn -B clean verify
        env:
          SPRING_DATASOURCE_URL: jdbc:mysql://localhost:3306/SEC
          SPRING_DATASOURCE_USERNAME: root
          SPRING_DATASOURCE_PASSWORD: root

      # 6. Upload Coverage
      - name: Upload JaCoCo Report
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: target/site/jacoco/

      # 7. Upload JAR
      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: target/*.jar

      # 8. Sonar Analysis
      - name: SonarCloud Analysis
        run: |
          mvn sonar:sonar \
            -Dsonar.organization=arjunrathod1996 \
            -Dsonar.projectKey=arjunrathod1996_SCMProject \
            -Dsonar.host.url=${{ secrets.SONAR_HOST_URL }} \
            -Dsonar.token=${{ secrets.SONAR_TOKEN }} \
            -Dsonar.pullrequest.key=${{ github.event.pull_request.number }} \
            -Dsonar.pullrequest.branch=${{ github.head_ref }} \
            -Dsonar.pullrequest.base=${{ github.base_ref }} \
            -Dsonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml \
            -Dsonar.qualitygate.wait=true

      # 9. Security Scan (NEW - enterprise level)
      - name: Trivy Security Scan
        uses: aquasecurity/trivy-action@v0.20.0
        with:
          scan-type: fs
          severity: CRITICAL,HIGH

      # 10. Debug logs on failure (VERY USEFUL)
      - name: Debug logs (on failure)
        if: failure()
        run: |
          echo "==== DEBUG INFO ===="
          docker ps -a
          kubectl version || true